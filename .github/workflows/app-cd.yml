# ──────────────────────────────────────────────────────────────
# APP CD — DevSecOps Gates + Deploy on Merge to main
# ──────────────────────────────────────────────────────────────
# TRIGGER: Push to main (src/ changes), or manual dispatch
#
# WHY re-run CI gates in CD?
#   PR CI ran hours/days ago. Between merge and deploy:
#   - New CVE published (dependency now vulnerable)
#   - Someone pushed directly to main (bypassed PR)
#   - PR was from a fork (limited CI permissions)
#   The artifact deployed to PROD MUST be scanned fresh.
#
# FLOW:
#   ┌───────────────┐     ┌───────────┐     ┌────────────┐     ┌────────────┐
#   │ DevSecOps     │────▶│  Build    │────▶│ Deploy DEV │────▶│ Deploy PROD│
#   │ Gates         │     │  Artifact │     │ (auto)     │     │ (approval) │
#   │               │     │           │     │            │     │            │
#   │ build+test    │     │ publish   │     │ zip deploy │     │ zip deploy │
#   │ trivy+owasp   │     │ artifact  │     │ health ✓   │     │ health ✓   │
#   │ sonarcloud    │     │           │     │            │     │            │
#   └───────────────┘     └───────────┘     └────────────┘     └────────────┘
#        MUST PASS            MUST PASS         MUST PASS        APPROVAL
#
# TEMPLATES USED:
#   ci-devsecops.yml → enforced gates (same as PR CI)
#   dotnet-build     → build + publish artifact
#   deploy-webapp    → OIDC login + zip deploy + health check
#
# FUTURE PATH (containerize):
#   Replace deploy-webapp with docker-build + deploy-aks
#   Gates + build stay UNCHANGED — only deploy jobs change.
# ──────────────────────────────────────────────────────────────

name: "App — CD (Deploy)"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/app-cd.yml"
      - ".github/actions/dotnet-build/**"
      - ".github/actions/deploy-webapp/**"

  # Manual trigger — redeploy without code change
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
          - all

permissions:
  id-token: write      # OIDC login to Azure
  contents: read       # Checkout code
  pull-requests: write # DevSecOps report (if triggered by PR merge)
  security-events: write

jobs:
  # ────────────────────────────────────────────────────────────
  # GATE: Enforced DevSecOps checks (SAME as PR CI)
  # Must pass before artifact is built or anything is deployed.
  # ────────────────────────────────────────────────────────────
  ci-gates:
    name: "🔒 DevSecOps Gates"
    uses: ./.github/workflows/ci-devsecops.yml
    with:
      language: "dotnet"
      project-path: "src/MedCore.Api/MedCore.Api.csproj"
      scan-path: "src/"
      sonar-org: "gouthamkumar4"
      sonar-project-key: "GouthamKumar4_simple-app"
    secrets: inherit

  # ────────────────────────────────────────────────────────────
  # BUILD: Create deploy artifact (only after gates pass)
  # ────────────────────────────────────────────────────────────
  build:
    name: "📦 Build Artifact"
    needs: ci-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build + Publish
        uses: ./.github/actions/dotnet-build
        with:
          project-path: src/MedCore.Api/MedCore.Api.csproj
          publish: "true"
          artifact-name: medcore-api

  # ────────────────────────────────────────────────────────────
  # DEPLOY DEV: Automatic (no approval gate)
  # ────────────────────────────────────────────────────────────
  deploy-dev:
    name: "🚀 Deploy — DEV"
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'all'))
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to DEV App Service
        uses: ./.github/actions/deploy-webapp
        with:
          artifact-name: medcore-api
          azure-client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          app-name: app-medcore-dev-cin
          resource-group: rg-medcore-dev-cin

  # ────────────────────────────────────────────────────────────
  # DEPLOY PROD: Manual approval via GitHub environment
  # ────────────────────────────────────────────────────────────
  deploy-prod:
    name: "🚀 Deploy — PROD"
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'all'))
    environment: prod    # ← GitHub environment with required reviewers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to PROD App Service
        uses: ./.github/actions/deploy-webapp
        with:
          artifact-name: medcore-api
          azure-client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          app-name: app-medcore-prod-cin
          resource-group: rg-medcore-prod-cin
