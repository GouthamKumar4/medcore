# ──────────────────────────────────────────────────────────────
# APP CI — Calls the enforced DevSecOps pipeline1
# ──────────────────────────────────────────────────────────────
# THIS IS ALL A DEVELOPER WRITES. Everything else is enforced.
#
# The reusable workflow (ci-devsecops.yml) handles:
#   ✅ Build + Test (language-aware)
#   ✅ Security Scan (Trivy + OWASP + SBOM)
#   ✅ Code Quality (SonarCloud — multi-language)
#   ✅ PR comment with all gate results
#
# Developer CANNOT skip any gate. Platform team controls
# ci-devsecops.yml — if a new check is added there,
# ALL repos using it get the check automatically.
#
# FOR OTHER LANGUAGES, just change language + project-path:
#   language: python    project-path: src/app/requirements.txt
#   language: javascript  project-path: src/app/package.json
#   language: java      project-path: src/app/pom.xml
# ──────────────────────────────────────────────────────────────

name: "App — CI (DevSecOps)"

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/app-ci.yml"

  # Manual trigger — run CI checks on any branch anytime
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  ci:
    name: "DevSecOps"
    uses: ./.github/workflows/ci-devsecops.yml
    with:
      language: "dotnet"
      project-path: "src/MedCore.Api/MedCore.Api.csproj"
      scan-path: "src/"
      sonar-org: "gouthamkumar4"
      sonar-project-key: "GouthamKumar4_simple-app"
    secrets: inherit
