# ──────────────────────────────────────────────────────────────
# ENFORCED CI — DevSecOps Pipeline (Reusable Workflow)
# ──────────────────────────────────────────────────────────────
# THIS IS THE ENFORCER. Developers don't build their own CI.
# They CALL this workflow. All gates are mandatory.
#
# WHY a reusable workflow (not composite action)?
#   Composite actions = steps in ONE job (can't do parallel)
#   Reusable workflows = full jobs (parallel, separate UI, enforced)
#
# WHAT developers do:
#   # their app-ci.yml — entire file:
#   jobs:
#     ci:
#       uses: ./.github/workflows/ci-devsecops.yml
#       with:
#         language: dotnet
#         project-path: src/MedCore.Api/MedCore.Api.csproj
#       secrets: inherit
#
# WHAT THEY GET (automatically — can't skip):
#   ┌──────────┐   ┌──────────────┐   ┌──────────────┐
#   │ Build +  │──▶│ Security     │   │ Code Quality │
#   │ Test     │   │ Scan         │   │ (SonarCloud) │
#   │          │   │              │   │              │
#   │ restore  │   │ Trivy FS     │   │ multi-lang   │
#   │ build    │   │ OWASP Dep    │   │ auto-detect  │
#   │ test     │   │ SBOM         │   │              │
#   └──────────┘   └──────────────┘   └──────────────┘
#                         ↑ runs in parallel ↑
#
# LANGUAGES: dotnet, python, javascript, java, go
# ──────────────────────────────────────────────────────────────

name: "CI — DevSecOps (Enforced)"

on:
  workflow_call:
    inputs:
      language:
        description: "Project language: dotnet, python, javascript, java, go"
        required: true
        type: string
      project-path:
        description: "Path to project file (.csproj, requirements.txt, package.json, etc.)"
        required: true
        type: string
      dotnet-version:
        description: ".NET SDK version (only for dotnet)"
        required: false
        type: string
        default: "8.0.x"
      python-version:
        description: "Python version (only for python)"
        required: false
        type: string
        default: "3.11"
      node-version:
        description: "Node.js version (only for javascript/typescript)"
        required: false
        type: string
        default: "20"
      scan-path:
        description: "Path to scan for security vulnerabilities"
        required: false
        type: string
        default: "src/"
      sonar-org:
        description: "SonarCloud organization key"
        required: false
        type: string
        default: "gouthamkumar4"
      sonar-project-key:
        description: "SonarCloud project key"
        required: false
        type: string
        default: ""
      security-severity:
        description: "Min severity to fail security scan"
        required: false
        type: string
        default: "HIGH,CRITICAL"
      fail-on-security:
        description: "Fail pipeline if security issues found?"
        required: false
        type: string
        default: "true"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ────────────────────────────────────────────────────────────
  # GATE 1: Build + Test (language-aware)
  # MUST PASS before any other gate runs
  # ────────────────────────────────────────────────────────────
  build-and-test:
    name: "🔨 Build + Test (${{ inputs.language }})"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET ──
      - name: "[dotnet] Build + Test"
        if: inputs.language == 'dotnet'
        uses: ./.github/actions/dotnet-build
        with:
          project-path: ${{ inputs.project-path }}
          dotnet-version: ${{ inputs.dotnet-version }}
          publish: "false"

      # ── Python ──
      - name: "[python] Setup"
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: "[python] Install + Test"
        if: inputs.language == 'python'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          REQ_DIR=$(dirname "${{ inputs.project-path }}")
          if [ -f "$REQ_DIR/requirements.txt" ]; then
            pip install -r "$REQ_DIR/requirements.txt"
          fi
          pip install coverage
          # Run tests if tests/ directory exists
          TEST_DIR=$(find "$REQ_DIR" -type d -name "tests" | head -1)
          if [ -n "$TEST_DIR" ]; then
            coverage run -m unittest discover -s "$TEST_DIR" -v
            coverage xml
          else
            echo "No tests/ directory found — skipping tests"
          fi

      # ── JavaScript / TypeScript ──
      - name: "[js/ts] Setup"
        if: inputs.language == 'javascript' || inputs.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: "[js/ts] Install + Test"
        if: inputs.language == 'javascript' || inputs.language == 'typescript'
        shell: bash
        run: |
          PROJ_DIR=$(dirname "${{ inputs.project-path }}")
          cd "$PROJ_DIR"
          npm ci
          npm run build --if-present
          npm test --if-present

  # ────────────────────────────────────────────────────────────
  # GATE 2: Security Scan (Trivy + OWASP + SBOM)
  # Runs in PARALLEL with code-quality after build passes
  # ────────────────────────────────────────────────────────────
  security-scan:
    name: "🛡️ Security Scan"
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Security Scan
        uses: ./.github/actions/security-scan
        with:
          scan-path: ${{ inputs.scan-path }}
          severity: ${{ inputs.security-severity }}
          fail-on-findings: ${{ inputs.fail-on-security }}
          generate-sbom: "true"
          nvd-api-key: ${{ secrets.NVD_API_KEY }}

  # ────────────────────────────────────────────────────────────
  # GATE 3: Code Quality (SonarCloud — multi-language)
  # Runs in PARALLEL with security-scan after build passes
  # Gracefully skips if SONAR_TOKEN not set
  # ────────────────────────────────────────────────────────────
  code-quality:
    name: "📊 Code Quality"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_ENABLED == 'true' }}

    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Analysis
        uses: ./.github/actions/code-quality
        with:
          language: ${{ inputs.language }}
          project-path: ${{ inputs.project-path }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-org: ${{ inputs.sonar-org }}
          sonar-project-key: ${{ inputs.sonar-project-key }}
          dotnet-version: ${{ inputs.dotnet-version }}

  # ────────────────────────────────────────────────────────────
  # REPORT: Combined result posted to PR
  # Always runs — shows pass/fail/skip for every gate
  # ────────────────────────────────────────────────────────────
  report:
    name: "📋 CI Report"
    needs: [build-and-test, security-scan, code-quality]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Post DevSecOps report to PR
        uses: actions/github-script@v7
        with:
          script: |
            const build    = '${{ needs.build-and-test.result }}';
            const security = '${{ needs.security-scan.result }}';
            const quality  = '${{ needs.code-quality.result }}';
            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            const body = `### 🔒 DevSecOps CI — Enforced Gates

            | # | Gate | Status | What it checks |
            |---|------|--------|----------------|
            | 1 | Build + Test | ${icon(build)} **${build}** | Compile + unit tests (${{ inputs.language }}) |
            | 2 | Security Scan | ${icon(security)} **${security}** | Trivy FS · OWASP deps · SBOM |
            | 3 | Code Quality | ${icon(quality)} **${quality}** | SonarCloud (smells · bugs · coverage) |

            > **Language:** \`${{ inputs.language }}\` · **Commit:** \`${{ github.sha }}\`
            > SonarCloud: ${quality === 'skipped' ? 'Set `SONAR_ENABLED=true` in repo variables to enable' : '[View dashboard](https://sonarcloud.io/project/overview?id=${{ inputs.sonar-project-key }})'}

            ---
            *🔐 These gates are enforced by the platform team. Developers cannot skip them.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
