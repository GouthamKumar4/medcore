# ──────────────────────────────────────────────────────────────
# CI PIPELINE: Infrastructure — Validate on Pull Request
# ──────────────────────────────────────────────────────────────
# TRIGGERS:    Pull Request to main (infrastructure/** changes)
# PURPOSE:     Validate Terraform code BEFORE merging
# WHAT IT DOES:
#   1. terraform fmt -check  → Code formatting correct?
#   2. terraform validate    → Config syntax correct?
#   3. terraform plan (dev)  → What WILL change?
#   4. Post plan as PR comment → Reviewer sees exact changes
#
# SECURITY:    Uses OIDC — READ-ONLY plan MIs (Reader role, cannot apply/destroy)
# TEMPLATES:   terraform-setup (login+init) + terraform-plan (plan output)
# IDENTITY:    id-medcore-{env}-plan (Reader) — NOT the deploy MI (Contributor)
# ──────────────────────────────────────────────────────────────

name: "Infra CI — Validate & Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"

permissions:
  id-token: write      # OIDC login to Azure
  contents: read       # Checkout code
  pull-requests: write # Post plan comment on PR

jobs:
  # ── JOB 1: Format + Validate (fast — no Azure login needed) ──
  lint:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/environments/dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff ../../
        continue-on-error: true

      - name: Terraform Init (backend=false — no Azure needed)
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Post Lint Result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fmt = '${{ steps.fmt.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `### 🔍 Terraform Lint Results

            | Check | Status |
            |-------|--------|
            | Format (\`terraform fmt\`) | ${icon(fmt)} ${fmt} |
            | Validate (\`terraform validate\`) | ${icon(validate)} ${validate} |
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── JOB 2: Plan DEV (shows reviewer what will change) ─────────
  plan-dev:
    name: "Plan — DEV"
    runs-on: ubuntu-latest
    needs: lint
    environment: dev-plan    # ← READ-ONLY MI (Reader role, cannot apply/destroy)
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Setup + Init (reusable template)
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: infrastructure/environments/dev
          azure-client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan (reusable template)
        id: plan
        uses: ./.github/actions/terraform-plan
        with:
          working-directory: infrastructure/environments/dev
        continue-on-error: true

      - name: Post Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ steps.plan.outputs.plan-file }}', 'utf8');

            // Truncate if too long (GitHub comment limit 65536 chars)
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `### 📋 Terraform Plan — DEV Environment

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            **Plan exit code:** \`${{ steps.plan.outcome }}\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── JOB 3: Plan PROD (shows reviewer prod impact) ─────────────
  plan-prod:
    name: "Plan — PROD"
    runs-on: ubuntu-latest
    needs: lint
    environment: prod-plan   # ← READ-ONLY MI (Reader role, cannot apply/destroy)
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Setup + Init (reusable template)
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: infrastructure/environments/prod
          azure-client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan (reusable template)
        id: plan
        uses: ./.github/actions/terraform-plan
        with:
          working-directory: infrastructure/environments/prod
        continue-on-error: true

      - name: Post Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ steps.plan.outputs.plan-file }}', 'utf8');

            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `### 📋 Terraform Plan — PROD Environment

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            **Plan exit code:** \`${{ steps.plan.outcome }}\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
