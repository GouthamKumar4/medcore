# ──────────────────────────────────────────────────────────────
# TEMPLATE: .NET Build + Test + Publish
# ──────────────────────────────────────────────────────────────
# WHO uses this:
#   app-ci.yml  → build + test (PR validation)
#   app-cd.yml  → build + test + publish (deploy artifact)
#
# WHY a template?
#   Used in 3+ jobs (ci, cd-dev, cd-prod).
#   Template if used 2+ times = DRY.
#
# WHAT it does:
#   1. Setup .NET SDK
#   2. Restore NuGet packages
#   3. Build in Release mode
#   4. Run tests (if test project exists)
#   5. Publish artifact (optional — only for deploy)
# ──────────────────────────────────────────────────────────────

name: ".NET Build + Test"
description: "Build, test, and optionally publish a .NET project"

inputs:
  project-path:
    description: "Path to the .csproj file"
    required: true
  dotnet-version:
    description: ".NET SDK version"
    required: false
    default: "8.0.x"
  publish:
    description: "Publish artifact for deployment? (true/false)"
    required: false
    default: "false"
  artifact-name:
    description: "Name for the upload artifact"
    required: false
    default: "app-artifact"

runs:
  using: "composite"
  steps:
    # ── 1. Setup .NET SDK ──
    - name: Setup .NET ${{ inputs.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    # ── 2. Restore ──
    - name: Restore NuGet packages
      shell: bash
      run: dotnet restore ${{ inputs.project-path }}

    # ── 3. Build ──
    - name: Build (Release)
      shell: bash
      run: dotnet build ${{ inputs.project-path }} --configuration Release --no-restore

    # ── 4. Test (find and run any test projects) ──
    - name: Run tests
      shell: bash
      run: |
        # Find test projects in the solution directory
        TEST_PROJECTS=$(find "$(dirname ${{ inputs.project-path }})/.." -name "*.Tests.csproj" -o -name "*.Test.csproj" 2>/dev/null || true)
        if [ -n "$TEST_PROJECTS" ]; then
          echo "Found test projects:"
          echo "$TEST_PROJECTS"
          for proj in $TEST_PROJECTS; do
            dotnet test "$proj" --configuration Release --no-build --verbosity normal
          done
        else
          echo "No test projects found — skipping tests"
        fi

    # ── 5. Publish (only when deploying) ──
    - name: Publish
      if: inputs.publish == 'true'
      shell: bash
      run: |
        dotnet publish ${{ inputs.project-path }} \
          --configuration Release \
          --no-build \
          --output ./publish

    - name: Upload artifact
      if: inputs.publish == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./publish
        retention-days: 1
