# ──────────────────────────────────────────────────────────────
# TEMPLATE: Security Scan (SAST + Dependency + SBOM)
# ──────────────────────────────────────────────────────────────
# WHO uses this:
#   app-ci.yml → security job (runs after build passes)
#
# WHAT it does:
#   1. Trivy filesystem scan (vulnerabilities in code + deps)
#   2. OWASP Dependency Check (known CVEs in NuGet packages)
#   3. SBOM generation (Software Bill of Materials)
#
# WHY a template?
#   Same security checks for dev and prod.
#   Add a new scan? Change 1 file, all pipelines get it.
#
# LANGUAGE: Works for .NET, Python, Node.js — Trivy auto-detects
# ──────────────────────────────────────────────────────────────

name: "Security Scan"
description: "Trivy FS scan + OWASP dependency check + SBOM"

inputs:
  scan-path:
    description: "Path to scan"
    required: false
    default: "."
  severity:
    description: "Minimum severity to fail (CRITICAL, HIGH, MEDIUM, LOW)"
    required: false
    default: "HIGH,CRITICAL"
  fail-on-findings:
    description: "Fail pipeline if vulnerabilities found? (true/false)"
    required: false
    default: "true"
  generate-sbom:
    description: "Generate SBOM? (true/false)"
    required: false
    default: "true"
  nvd-api-key:
    description: "NVD API key for OWASP (free: https://nvd.nist.gov/developers/request-an-api-key). Without this, OWASP is SKIPPED (downloads 335K records = hours)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # ── 1. Trivy Filesystem Scan ──
    # Scans source code + dependency lock files for known CVEs
    # Detects: NuGet (*.csproj), npm, pip, Go, Dockerfile issues
    #
    # WHY shell instead of trivy-action wrapper?
    #   The trivy-action@0.28.0 wrapper has version mismatch with
    #   newer Trivy binaries (v0.56+). Running directly gives full
    #   control and avoids wrapper compatibility issues.
    - name: "🔍 Trivy — Install Scanner"
      shell: bash
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        trivy --version

    - name: "🔍 Trivy — Filesystem Scan"
      shell: bash
      run: |
        trivy fs ${{ inputs.scan-path }} \
          --severity ${{ inputs.severity }} \
          --ignore-unfixed \
          --format table \
          --exit-code ${{ inputs.fail-on-findings == 'true' && '1' || '0' }}

    # ── 2. OWASP Dependency Check ──
    # Deep scan of dependencies against NVD (National Vulnerability Database)
    # More thorough than Trivy for transitive dependency chains
    #
    # REQUIRES: NVD API key (free from https://nvd.nist.gov/developers/request-an-api-key)
    # WITHOUT API KEY: Downloads 335,288 NVD records = 1-2 HOURS per run.
    # WITH API KEY: ~2-5 minutes.
    #
    # If no API key → OWASP skipped, uses `dotnet list package --vulnerable` instead.
    # ──────────────────────────────────────────────────────────────

    # Path A: NVD API key provided → full OWASP scan
    - name: "🛡️ OWASP — Install Dependency Check"
      if: inputs.nvd-api-key != ''
      shell: bash
      run: |
        DC_VERSION="11.1.1"
        DC_DIR="$RUNNER_TEMP/dependency-check"
        mkdir -p "$DC_DIR"
        curl -sL "https://github.com/jeremylong/DependencyCheck/releases/download/v${DC_VERSION}/dependency-check-${DC_VERSION}-release.zip" -o "$DC_DIR/dc.zip"
        unzip -q "$DC_DIR/dc.zip" -d "$DC_DIR"
        echo "$DC_DIR/dependency-check/bin" >> $GITHUB_PATH

    - name: "🛡️ OWASP — Dependency Check Scan"
      if: inputs.nvd-api-key != ''
      shell: bash
      run: |
        mkdir -p reports
        dependency-check.sh \
          --project "MedCore" \
          --scan "${{ inputs.scan-path }}" \
          --format HTML \
          --out reports/ \
          --disableAssembly \
          --nvdApiKey "${{ inputs.nvd-api-key }}" || true
        # || true: OWASP can still fail on NVD API rate limits

    - name: Upload OWASP Report
      if: always() && inputs.nvd-api-key != ''
      uses: actions/upload-artifact@v4
      with:
        name: owasp-report
        path: reports/
        retention-days: 7
        if-no-files-found: warn

    # Path B: No NVD API key → lightweight .NET vulnerability check
    - name: "🛡️ Lightweight Dep Check (no NVD API key)"
      if: inputs.nvd-api-key == ''
      shell: bash
      run: |
        echo "⚠️  OWASP skipped — no NVD API key provided"
        echo "    Get a FREE key: https://nvd.nist.gov/developers/request-an-api-key"
        echo "    Add as secret: NVD_API_KEY in GitHub repo settings"
        echo ""
        echo "Running lightweight vulnerability check instead..."
        echo ""
        # dotnet list package --vulnerable uses NuGet advisory DB (fast, no API key)
        if command -v dotnet &> /dev/null; then
          CSPROJ=$(find "${{ inputs.scan-path }}" -name "*.csproj" | head -1)
          if [ -n "$CSPROJ" ]; then
            dotnet restore "$CSPROJ" --verbosity quiet 2>/dev/null || true
            echo "=== Known Vulnerable Packages ==="
            dotnet list "$CSPROJ" package --vulnerable 2>/dev/null || echo "No vulnerable packages found."
            echo ""
            echo "=== Deprecated Packages ==="
            dotnet list "$CSPROJ" package --deprecated 2>/dev/null || echo "No deprecated packages found."
          else
            echo "No .csproj found — skipping .NET dep check"
          fi
        else
          echo "dotnet SDK not available — skipping lightweight dep check"
        fi

    # ── 3. SBOM Generation ──
    # Software Bill of Materials — required for compliance
    # Lists every dependency + version (like a food ingredients label)
    - name: "📋 Generate SBOM"
      if: inputs.generate-sbom == 'true'
      uses: anchore/sbom-action@v0
      with:
        path: ${{ inputs.scan-path }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      if: inputs.generate-sbom == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json
        retention-days: 30
