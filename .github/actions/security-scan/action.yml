# ──────────────────────────────────────────────────────────────
# TEMPLATE: Security Scan (SAST + Dependency + SBOM)
# ──────────────────────────────────────────────────────────────
# WHO uses this:
#   app-ci.yml → security job (runs after build passes)
#
# WHAT it does:
#   1. Trivy filesystem scan (vulnerabilities in code + deps)
#   2. OWASP Dependency Check (known CVEs in NuGet packages)
#   3. SBOM generation (Software Bill of Materials)
#
# WHY a template?
#   Same security checks for dev and prod.
#   Add a new scan? Change 1 file, all pipelines get it.
#
# LANGUAGE: Works for .NET, Python, Node.js — Trivy auto-detects
# ──────────────────────────────────────────────────────────────

name: "Security Scan"
description: "Trivy FS scan + OWASP dependency check + SBOM"

inputs:
  scan-path:
    description: "Path to scan"
    required: false
    default: "."
  severity:
    description: "Minimum severity to fail (CRITICAL, HIGH, MEDIUM, LOW)"
    required: false
    default: "HIGH,CRITICAL"
  fail-on-findings:
    description: "Fail pipeline if vulnerabilities found? (true/false)"
    required: false
    default: "true"
  generate-sbom:
    description: "Generate SBOM? (true/false)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    # ── 1. Trivy Filesystem Scan ──
    # Scans source code + dependency lock files for known CVEs
    # Detects: NuGet (*.csproj), npm, pip, Go, Dockerfile issues
    #
    # WHY shell instead of trivy-action wrapper?
    #   The trivy-action@0.28.0 wrapper has version mismatch with
    #   newer Trivy binaries (v0.56+). Running directly gives full
    #   control and avoids wrapper compatibility issues.
    - name: "🔍 Trivy — Install Scanner"
      shell: bash
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        trivy --version

    - name: "🔍 Trivy — Filesystem Scan"
      shell: bash
      run: |
        trivy fs ${{ inputs.scan-path }} \
          --severity ${{ inputs.severity }} \
          --ignore-unfixed \
          --format table \
          --exit-code ${{ inputs.fail-on-findings == 'true' && '1' || '0' }}

    # ── 2. OWASP Dependency Check ──
    # Deep scan of dependencies against NVD (National Vulnerability Database)
    # More thorough than Trivy for transitive dependency chains
    #
    # WHY shell instead of Dependency-Check_Action@main?
    #   @main is unstable — output path changed, breaking report uploads.
    #   Running via CLI gives explicit control over output directory.
    - name: "🛡️ OWASP — Install Dependency Check"
      shell: bash
      run: |
        DC_VERSION="11.1.1"
        DC_DIR="$RUNNER_TEMP/dependency-check"
        mkdir -p "$DC_DIR"
        curl -sL "https://github.com/jeremylong/DependencyCheck/releases/download/v${DC_VERSION}/dependency-check-${DC_VERSION}-release.zip" -o "$DC_DIR/dc.zip"
        unzip -q "$DC_DIR/dc.zip" -d "$DC_DIR"
        echo "$DC_DIR/dependency-check/bin" >> $GITHUB_PATH

    - name: "🛡️ OWASP — Dependency Check Scan"
      shell: bash
      run: |
        mkdir -p reports
        dependency-check.sh \
          --project "MedCore" \
          --scan "${{ inputs.scan-path }}" \
          --format HTML \
          --out reports/ \
          --disableAssembly \
          --nvdApiDelay 6000 || true
        # || true: OWASP can fail on NVD API rate limits — don't block pipeline

    - name: Upload OWASP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: owasp-report
        path: reports/
        retention-days: 7
        if-no-files-found: warn

    # ── 3. SBOM Generation ──
    # Software Bill of Materials — required for compliance
    # Lists every dependency + version (like a food ingredients label)
    - name: "📋 Generate SBOM"
      if: inputs.generate-sbom == 'true'
      uses: anchore/sbom-action@v0
      with:
        path: ${{ inputs.scan-path }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      if: inputs.generate-sbom == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json
        retention-days: 30
